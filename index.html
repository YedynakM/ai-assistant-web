<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo">AI Assistant</span>
        <button id="closeSidebarBtn" class="icon-btn" aria-label="Close sidebar">&#10005;</button>
      </div>
      <button id="newChatBtn" class="new-chat-btn">+ New Chat</button>
      <div id="chatHistory" class="chat-history"></div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="chat-area">
      <header class="chat-header">
        <button id="menuBtn" class="icon-btn" aria-label="Open sidebar">&#9776;</button>
        <span id="userGreeting" class="greeting">AI Assistant</span>
        <button id="authBtn" class="auth-btn">Sign In with Google</button>
      </header>

      <div id="messagesContainer" class="messages-container">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">&#10024;</div>
          <h2>How can I help you today?</h2>
          <p>Sign in to start a conversation.</p>
        </div>
      </div>

      <div class="input-wrapper">
        <div class="input-area">
          <textarea
            id="messageInput"
            placeholder="Message AI Assistant..."
            disabled
            rows="1"
          ></textarea>
          <button id="sendBtn" disabled aria-label="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <p class="disclaimer">AI responses are in Ukrainian. Verify important information.</p>
      </div>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
